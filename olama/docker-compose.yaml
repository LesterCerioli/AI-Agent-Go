version: '3.8'

services:
  ollama:
    
    image: ollama/ollama:0.3.14
    container_name: ollama
    restart: unless-stopped
    ports:
      
      - "11434:11434"
    volumes:
      
      - ollama_data:/root/.ollama
    environment:
      
      - OLLAMA_HOST=0.0.0.0
      
      - OLLAMA_ORIGINS=*
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ollama_data: